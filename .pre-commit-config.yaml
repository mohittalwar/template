repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace     # removes trailing spaces
      - id: end-of-file-fixer       # ensures files end with a newline
      - id: check-yaml              # validates YAML syntax
      - id: check-json              # validates JSON syntax
      - id: check-added-large-files # blocks accidentally committed large files
      - id: check-merge-conflict    # blocks unresolved merge conflict markers
      - id: detect-private-key      # blocks accidentally committed private keys

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff        # linter: fixes imports, unused vars, style issues
      - id: ruff-format # formatter: enforces consistent code style (like Black)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy        # static type checker
